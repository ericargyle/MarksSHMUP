<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>MarksSHMUP</title>
    <meta name="description" content="A tiny mobile-friendly shmup prototype." />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="hud">
      <div><strong>MARKS SHMUP</strong></div>
      <div id="status">Touch ship to drag. Tap buttons to fire.</div>
      <div id="stats">Score 0 · Bombs 3 · Level 1</div>
    </div>
    <div id="controls">
      <button id="bombBtn">BOMB</button>
      <button id="laserBtn">LASER</button>
    </div>
    <script src="app.js"></script>
  </body>
</html>
