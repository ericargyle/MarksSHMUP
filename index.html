<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>MarksSHMUP</title>
    <meta name="description" content="Minimal controllable spaceship demo." />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="hud">WASD moves, arrows fire only.</div>
    <div id="footnote"></div>
    <div id="titleScreen" class="overlay">
      <div class="panel">
        <h1>MarksSHMUP</h1>
        <p>Move with WASD. Fire with arrows. Survive the swarm.</p>
        <div id="versionStamp"></div>
        <button id="startBtn">Start</button>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
